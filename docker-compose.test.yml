services:
  postgres-test:
    image: postgres:15-alpine
    container_name: hestia-test-db
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: hestia_test
    ports:
      - "5433:5432"
    volumes:
      - hestia_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d hestia_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  # S3-compatible storage for the e2e suite (real presigned-upload flow).
  # The hestia-e2e bucket is created idempotently by tests/e2e/global-setup.ts.
  minio-test:
    image: minio/minio:latest
    container_name: hestia-test-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"   # S3 API (host 9100 — the dev app owns 9002)
      - "9101:9001"   # console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hestia_test_data:
