# E2E happy-path suite (#161). Cadence (locked 2026-07-05): full suite on every
# PR into main/master and every push to release/** or hotfix/** — feature PRs
# run only unit+integration (test.yml).

name: E2E

on:
  pull_request:
    branches: [main, master]
  push:
    branches: ['release/**', 'hotfix/**']

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      E2E_DATABASE_URL: postgresql://test:test@localhost:5433/hestia_e2e_test

    steps:
      - uses: actions/checkout@v4

      # GitHub service containers can't override the image command, and
      # minio/minio needs `server /data` — start it as a plain container.
      # (The bucket is created by tests/e2e/global-setup.ts.)
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9100:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            if docker exec minio mc ready local >/dev/null 2>&1; then echo "minio ready"; exit 0; fi
            sleep 2
          done
          echo "minio failed to become ready" && docker logs minio && exit 1

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Provision e2e database
        run: DATABASE_URL="$E2E_DATABASE_URL" bun run scripts/test-db.ts setup

      - name: Run e2e suite
        # webServer in the config builds + starts the app with the e2e env.
        run: bunx playwright test --config=tests/e2e/playwright.config.ts

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
